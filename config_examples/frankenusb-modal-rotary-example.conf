# -*- mode: Python;-*-
# pylint: disable=invalid-name,missing-module-docstring

# Example config for MODAL_ROTARY: a rotary knob that does different things
# depending on the active mode.
#
# A rotary knob generates one button-down event per click — one USB button
# for clockwise, another for counterclockwise. The action taken depends on
# which mode is currently selected.
#
# Three button types are involved:
#
#   MODAL_ROTARY            — the knob turn itself
#   MODAL_ROTARY_MODE_SET   — set the active mode to a specific value
#   MODAL_ROTARY_MODE_CYCLE — cycle through a list of modes on each press
#
# Multiple rotaries can coexist in the same config; each is identified by
# a 'rotary id' string that links the knob to its mode selector button(s).

# Factor out the mode definitions so they are not repeated in both the
# CW and CCW button entries.
_OUTER_KNOB_MODES = {
    # Each mode maps to a PSX delta variable and the increment for one CW click.
    # The CCW handler negates the increment automatically.
    'MCP_ALTITUDE': {'psx variable': 'McpTurnAlt', 'increment': 1},
    'MCP_SPEED':    {'psx variable': 'McpTurnSpd', 'increment': 1},
    'MCP_HEADING':  {'psx variable': 'McpTurnHdg', 'increment': 1},
    'MCP_VS':       {'psx variable': 'McpTurnVs',  'increment': 1},
    'EFIS_BARO':    {'psx variable': 'EcpBaroCp',  'increment': 1},
    'EFIS_MINIMA':  {'psx variable': 'EcpMinsCp',  'increment': 1},
    # For modes that send a semicolon-delimited value, use 'increment index'
    # to place the (possibly accelerated) increment at the given field index,
    # with all other fields set to 0. 'fields' is the total field count.
    'VHF_BIG_KNOB':   {'psx variable': 'SwitchesRcpL', 'increment': 1,
                       'increment index': 1, 'fields': 3},
    'VHF_SMALL_KNOB': {'psx variable': 'SwitchesRcpL', 'increment': 1,
                       'increment index': 2, 'fields': 3},
}

CONFIG = {
    'My Rotary Panel': {  # Must match the USB device name shown by show_usb.py
        'button down': {

            # ----------------------------------------------------------------
            # The rotary knob itself (two buttons: CW and CCW)
            # ----------------------------------------------------------------
            # 'minimum interval' and 'acceleration' are optional. When the
            # time between consecutive clicks of the same button is less than
            # 'minimum interval' seconds, the increment is multiplied by
            # 'acceleration'. Omit both keys to disable acceleration.
            0: {
                'button type': 'MODAL_ROTARY',
                'rotary id': 'outer_knob',  # links knob to its mode selectors
                'direction': 'cw',
                'modes': _OUTER_KNOB_MODES,
                'minimum interval': 0.3,  # seconds between clicks to trigger acceleration
                'acceleration': 5,        # multiply increment when turning fast
            },
            1: {
                'button type': 'MODAL_ROTARY',
                'rotary id': 'outer_knob',
                'direction': 'ccw',
                'modes': _OUTER_KNOB_MODES,
                'minimum interval': 0.3,
                'acceleration': 5,
            },

            # ----------------------------------------------------------------
            # Mode selection — approach 1: multi-position switch or individual
            # buttons, each setting a specific mode.
            # Use this when each physical switch position maps to one mode.
            # ----------------------------------------------------------------
            10: {
                'button type': 'MODAL_ROTARY_MODE_SET',
                'rotary id': 'outer_knob',
                'mode': 'MCP_ALTITUDE',
            },
            11: {
                'button type': 'MODAL_ROTARY_MODE_SET',
                'rotary id': 'outer_knob',
                'mode': 'MCP_SPEED',
            },
            12: {
                'button type': 'MODAL_ROTARY_MODE_SET',
                'rotary id': 'outer_knob',
                'mode': 'MCP_HEADING',
            },
            13: {
                'button type': 'MODAL_ROTARY_MODE_SET',
                'rotary id': 'outer_knob',
                'mode': 'MCP_VS',
            },

            # ----------------------------------------------------------------
            # Mode selection — approach 2: single toggle button that cycles
            # through a configured list of modes. 'mode order' defines the
            # sequence; the first entry is also the initial mode on first press.
            # Use this instead of (or alongside) the SET buttons above.
            # ----------------------------------------------------------------
            20: {
                'button type': 'MODAL_ROTARY_MODE_CYCLE',
                'rotary id': 'outer_knob',
                'mode order': [
                    'MCP_ALTITUDE', 'MCP_SPEED', 'MCP_HEADING',
                    'MCP_VS', 'EFIS_BARO', 'EFIS_MINIMA',
                ],
            },
        },
    },
}
